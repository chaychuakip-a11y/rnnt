[Model]
# 文件名 + 类名，注意与 net_relu__addS_phCTC-add-hidden_skip_try2_para.py 对应
ModelName = net_relu__addS_phCTC-add-hidden_skip_try2_para.Transducer
Trainer   = net_relu__addS_phCTC-add-hidden_skip_try2_para.trainer

[TrainSetting]
TrainType = ASR

OutDir    = train_v0

# 跨语种初始化：从法语 CECTC 模型加载 Encoder 权重（Decoder/Joint 因 vocab_size 不同会自动跳过）
# 填入法语模型路径后取消注释
;initEncoderModel = PLACEHOLDER_FRENCH_CECTC_MODEL

Iter          = 20
Half          = 3
HalfHold      = 1
InitLearningRate = 0.015
LearningRate     = 0.02

Display       = 300
Optimizer     = SGD
LookAhead     = False
LookAhead_K   = 5
LookAhead_Alpha = 0.5

CVSentNum     = 1000
CVInterval    = 0

NGpu          = 8
RandomSeed    = 0
InitSent      = 300000

ClipGradient  = 2
ClipGradient2 = 20
Discount      = 0.5

CheckLoss     = False

BMUF_ALPHA    = 1.0
BMUF_BLR      = 1.0
BMUF_BM       = 0.875
BMUF_SYNC     = 10

JIT           = False

[DataSetting]
InitBunchsize     = 14000
Bunchsize         = 14000
PadNum            = 4
NumFramePredict   = 4
PadNumBetweenSent = 1
MaxNumSent        = 4096
MaxBatchFrame     = 4096
MaxSentFrame      = 4096

# pfile 目录 —— 等 2.down_pfile_hu 完成后填入
DataDir  = PLACEHOLDER_HU_FBANK_PFILE_DIR
LabelDir = PLACEHOLDER_HU_LABEL_PFILE_DIR

# label pfile 2列格式：列1=BPE token labels，列2=帧级phone labels（FA输出）
LabelPrefix   = lab.pfile$
FeaturePrefix = fea.pfile$

ShuffleBatch  = True
ShuffleSeq    = True
Npart         = 10

NormFile = PLACEHOLDER_HU_NORM_FILE

# 验证集：用训练 pfile part0 末尾的 CVSentNum 句（单独验证集目录留空时自动截取）
ValidationDatadir = PLACEHOLDER_HU_LABEL_PFILE_DIR
ValidationFeature = fea.pfile0
ValidationLabel   = lab.pfile0

[PartDistribution]
# 不填则默认每个 Iteration 遍历全部 Npart 个 part
# 如需按句数切分（适合数据量很大时），参考注释格式：
# Iteration0 = 0:0-500000,1:0-500000,...,9:0-500000
# Iteration1 = 0:500000-1000000,...
